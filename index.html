<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="ShopTalk-AI — AI-powered backend for business and inventory management." />
  <title>ShopTalk-AI</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: #1a1a1a;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    main {
      max-width: 42rem;
      text-align: center;
    }
    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      margin: 0 0 0.5rem;
      color: #0d1117;
    }
    p {
      margin: 0 0 1.5rem;
      color: #444;
    }
    a {
      color: #0969da;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.6rem;
      font-size: 0.875rem;
      background: #eaeef2;
      border-radius: 6px;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>ShopTalk-AI</h1>
    <p>AI-powered backend for business and inventory management. FastAPI, Azure Cosmos DB, and Azure OpenAI.</p>
    <a href="https://github.com/aiexpert-Azan/ShopTalk-AI" class="badge">Repository</a>
  </main>
</body>
</html>
